<!DOCTYPE html>
<html>
<head>
  <title>6DoF Lab Exploration</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
    }
    
    #header {
      position: absolute;
      top: 15px;
      width: 100%;
      text-align: center;
      color: #2c3e50; 
      z-index: 10;
      pointer-events: none; /* Lets you click through the text to focus the canvas */
    }

    h1 {
      margin: 0 0 5px 0;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }

    p {
      margin: 0;
      font-size: 15px;
      color: #34495e;
      font-weight: 500;
    }

    canvas { 
      display: block; 
    }
  </style>
</head>
<body>

<div id="header">
  <h1>6 Degrees of Freedom - Interactive Lab</h1>
  <p><strong>Controls (Click screen first!):</strong> Move: Arrows/F/S/A/D | Rotate: X/Y/Z (Hold Shift to reverse)</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script> 
<script>
// --- Scene Setup ---
const mainScene = new THREE.Scene();

// --- Camera Setup ---
const viewCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
viewCamera.position.z = 4; 

// --- Renderer Setup ---
const webRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
webRenderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(webRenderer.domElement);

// --- Lighting Setup ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); 
mainScene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1); 
directionalLight.position.set(5, 5, 5); 
mainScene.add(directionalLight);

// --- 3D Object (The Target) ---
const boxShape = new THREE.BoxGeometry(1.2, 1.2, 1.2); 
const boxSkin = new THREE.MeshStandardMaterial({ 
  color: 0xff5733, 
  roughness: 0.4,  
  metalness: 0.1   
}); 
const interactiveBox = new THREE.Mesh(boxShape, boxSkin);
mainScene.add(interactiveBox);

// --- 6DoF Keyboard Controls ---
window.addEventListener('keydown', function(event) {
  const step = 0.1; 

  // -- ROTATION (Pitch, Yaw, Roll) --
  if (event.key === 'x') interactiveBox.rotation.x += step;
  if (event.key === 'X') interactiveBox.rotation.x -= step;

  if (event.key === 'y') interactiveBox.rotation.y += step;
  if (event.key === 'Y') interactiveBox.rotation.y -= step;
  
  if (event.key === 'z') interactiveBox.rotation.z += step;
  if (event.key === 'Z') interactiveBox.rotation.z -= step;

  // -- TRANSLATION (Heave, Sway, Surge) --
  if (event.key === 'ArrowUp') interactiveBox.position.y += step;
  if (event.key === 'ArrowDown') interactiveBox.position.y -= step;
  if (event.key === 'f') interactiveBox.position.y += step; 
  if (event.key === 's') interactiveBox.position.y -= step; 
  
  if (event.key === 'ArrowLeft') interactiveBox.position.x -= step;
  if (event.key === 'ArrowRight') interactiveBox.position.x += step;

  if (event.key === 'a') interactiveBox.position.z += step; 
  if (event.key === 'd') interactiveBox.position.z -= step; 
});

// --- Animation Loop ---
function startRenderLoop() {
  requestAnimationFrame(startRenderLoop);
  webRenderer.render(mainScene, viewCamera);
}

startRenderLoop();

// --- Responsive Window ---
window.addEventListener('resize', () => {
    webRenderer.setSize(window.innerWidth, window.innerHeight);
    viewCamera.aspect = window.innerWidth / window.innerHeight;
    viewCamera.updateProjectionMatrix();
});
</script>

</body>
</html>
